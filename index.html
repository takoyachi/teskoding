<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ulangan Coding Smstr 2</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea, #43cea2, #f7971e);
  background-size: 300% 300%;
  animation: gradientMove 8s ease infinite;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  overflow: hidden;
}

.container {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  padding:25px;
  border-radius:20px;
  width:420px;
  box-shadow:0 10px 40px rgba(0,0,0,0.2);
  animation:fadeIn 0.5s ease;
  position: relative;
}

/* MODAL POP UP */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 100;
  opacity: 0;
  visibility: hidden;
  transition: 0.3s ease;
}

.modal-overlay.active {
  opacity: 1;
  visibility: visible;
}

.modal-content {
  background: white;
  padding: 30px;
  border-radius: 20px;
  width: 90%;
  max-width: 500px;
  max-height: 80vh;
  overflow-y: auto;
  text-align: center;
  transform: scale(0.7);
  transition: 0.3s ease;
}

.modal-overlay.active .modal-content {
  transform: scale(1);
}

.gif-lucu {
  width: 100px;
  height: auto;
  margin: 10px auto;
  display: block;
}

h2 {
  text-align:center;
  background: linear-gradient(90deg,#667eea,#43cea2);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-top: 0;
}

input {
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  border:1px solid #ddd;
  box-sizing: border-box;
}

.option {
  margin:10px 0;
  padding:12px;
  background:#f9fafb;
  border-radius:12px;
  cursor:pointer;
  transition:0.25s;
  border:2px solid transparent;
}

.option.selected {
  background: linear-gradient(135deg,#667eea,#43cea2);
  color:white;
}

button {
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:12px;
  background: linear-gradient(135deg,#667eea,#43cea2);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.timer {
  text-align:center;
  font-weight:bold;
  margin-bottom:10px;
  color:#ff4d4d;
}

.hidden {display:none;}

table {
  width: 100%;
  margin-top:15px;
  border-collapse: collapse;
}

th { background: #43cea2; color: white; padding: 10px; }
td { padding: 8px; border-bottom: 1px solid #eee; }

@keyframes fadeIn { from {opacity:0; transform:translateY(10px);} to {opacity:1; transform:translateY(0);} }
@keyframes gradientMove { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
</style>
</head>

<body>

<div class="container">
  <div id="start">
    <h2>Ulangan Coding Smstr 2</h2>
    <input type="text" id="nama" placeholder="Masukkan Nama Kamu" autocomplete="off">
    <input type="text" id="kelas" placeholder="Masukkan Kelas" autocomplete="off">
    <button onclick="mulaiKuis()">Mulai Kuis</button>
  </div>

  <div id="quiz" class="hidden">
    <div class="timer" id="timer">Waktu: 35:00</div>
    <h3 id="question" style="min-height: 60px; text-align: center;"></h3>
    <div id="options"></div>
    <button onclick="nextQuestion()">Pertanyaan Selanjutnya</button>
  </div>
</div>

<div class="modal-overlay" id="modalResult">
  <div class="modal-content">
    <h2>Hasil Kuis</h2>
    <div id="hasilDetail" style="font-size: 1.2em; margin-bottom: 20px;"></div>
    

    <h3>Leaderboard</h3>
    <table>
      <thead>
        <tr>
          <th>Nama</th>
          <th>Kelas</th>
          <th>Nilai</th>
        </tr>
      </thead>
      <tbody id="scoreTable"></tbody>
    </table>
    <button onclick="location.reload()" style="background: #667eea; margin-top: 20px;">Ulang lagi</button>
  </div>
</div>

<script>
const quiz = [
{question:"Apa yang dimaksud dengan Artificial Intelligence (AI)?", options:["Program untuk membuat website","Teknologi yang memungkinkan mesin meniru kecerdasan manusia","Sistem penyimpanan data","Bahasa pemrograman"], answer:1},
{question:"Machine Learning (ML) adalah…", options:["Sistem komputer tanpa data","Metode komputer belajar dari data untuk menemukan pola","Program untuk membuat game","Sistem operasi komputer"], answer:1},
{question:"Contoh penggunaan Machine Learning adalah…", options:["Mengetik dokumen","AI mengenali wajah dari foto","Menyalakan komputer","Mengganti wallpaper"], answer:1},
{question:"Deep Learning merupakan…", options:["Bagian dari hardware","Bagian dari ML yang lebih canggih","Bahasa pemrograman","Sistem database"], answer:1},
{question:"Deep Learning menggunakan struktur…", options:["Jaringan kabel","Neural Networks","Sistem operasi","File manager"], answer:1},
{question:"Neural Networks meniru…", options:["Struktur komputer","Otak manusia","Jaringan internet","Hard disk"], answer:1},
{question:"Teknologi pengenalan wajah menggunakan…", options:["Microsoft Word","Deep Learning","Excel","Paint"], answer:1},
{question:"Tahap pertama AI belajar adalah…", options:["Penalaran","Koreksi diri","Pengumpulan data","Output"], answer:2},
{question:"Pengumpulan data bertujuan untuk…", options:["Menghapus data","Memperoleh informasi","Menyimpan gambar","Menghapus program"], answer:1},
{question:"Learning dalam AI berarti…", options:["Bermain game","Mengumpulkan dan memahami data","Menghapus file","Menginstal aplikasi"], answer:1},
{question:"Reasoning dalam AI adalah…", options:["Menyimpan data","Menggunakan logika untuk mengambil kesimpulan","Menghapus program","Menyalakan komputer"], answer:1},
{question:"Self-correction adalah…", options:["Menghapus sistem","Memperbaiki hasil berdasarkan data baru","Menginstal ulang OS","Menambah RAM"], answer:1},
{question:"Tujuan self-correction adalah…", options:["Mempercepat komputer","Meningkatkan akurasi hasil","Menghapus data","Menyimpan file"], answer:1},
{question:"Artificial Narrow Intelligence (ANI) adalah…", options:["AI yang bisa semua hal","AI yang fokus pada satu tugas","AI tanpa fungsi","AI untuk gaming saja"], answer:1},
{question:"Contoh ANI adalah…", options:["Robot manusia","Asisten virtual","AI super cerdas","Mesin waktu"], answer:1},
{question:"Artificial General Intelligence (AGI) adalah…", options:["AI terbatas","AI setara manusia dalam berbagai bidang","AI untuk game","AI untuk gambar saja"], answer:1},
{question:"Status AGI saat ini adalah…", options:["Sudah digunakan luas","Masih dalam penelitian","Sudah usang","Tidak mungkin dibuat"], answer:1},
{question:"Artificial Super Intelligence (ASI) adalah…", options:["AI biasa","AI di bawah manusia","AI melebihi kecerdasan manusia","AI untuk sekolah"], answer:2},
{question:"ASI saat ini…", options:["Sudah ada","Dalam produksi massal","Masih konsep","Digunakan di sekolah"], answer:2},
{question:"AI belajar dari data untuk…", options:["Menghapus file","Menemukan pola","Menambah RAM","Mengganti OS"], answer:1},
{question:"Perbedaan ML dan Deep Learning adalah…", options:["ML lebih kompleks","DL bagian dari ML dan lebih canggih","ML tidak pakai data","DL tidak pakai jaringan"], answer:1},
{question:"Contoh penerapan AI di kehidupan sehari-hari adalah…", options:["Kalkulator manual","Rekomendasi YouTube","Buku tulis","Jam analog"], answer:1},
{question:"Tahap reasoning membantu AI untuk…", options:["Menghapus data","Mengambil keputusan","Menyimpan file","Menggambar"], answer:1},
{question:"AI meningkatkan akurasi melalui…", options:["Restart komputer","Self-correction","Shutdown","Formatting"], answer:1},
{question:"Fungsi utama data dalam AI adalah…", options:["Hiasan","Sumber pembelajaran","Backup saja","Tidak penting"], answer:1},
{question:"Sistem AI yang hanya bisa satu tugas disebut…", options:["AGI","ASI","ANI","API"], answer:2},
{question:"Neural Networks terdiri dari…", options:["Kabel listrik","Lapisan-lapisan neuron buatan","Hard disk","Monitor"], answer:1},
{question:"ChatGPT termasuk teknologi berbasis…", options:["Deep Learning","Word","Paint","Excel"], answer:0},
{question:"AI menjadi lebih pintar karena…", options:["Banyak RAM","Banyak data dan pembelajaran","Internet cepat","CPU besar"], answer:1},
{question:"Urutan proses AI yang benar adalah…", options:["Reasoning → Learning → Self-correction","Learning → Reasoning → Self-correction","Self-correction → Learning → Reasoning","Reasoning → Self-correction → Learning"], answer:1},
{question:"Efek wajah di TikTok/Instagram bekerja dengan cara…", options:["Menghapus gambar","Mendeteksi titik wajah dengan AI","Mengubah warna layar","Mengedit manual"], answer:1},
{question:"Teknologi pada filter wajah termasuk…", options:["Word processing","Computer vision","Database","Networking"], answer:1},
{question:"AI pada filter wajah digunakan untuk…", options:["Menghapus akun","Mengenali bagian wajah","Mengganti password","Mengatur jaringan"], answer:1},
{question:"Contoh AI di media sosial adalah…", options:["Menulis status","Filter wajah otomatis","Login akun","Menghapus komentar"], answer:1},
{question:"Algoritma konten berfungsi untuk…", options:["Menghapus video","Menampilkan sesuai minat","Mengunci akun","Mengganti username"], answer:1},
{question:"FYP sesuai minat karena…", options:["Random","AI belajar dari kebiasaan","Diatur manual","Berdasarkan waktu"], answer:1},
{question:"AI belajar dari…", options:["Nama akun","Aktivitas user","Warna aplikasi","Jenis HP"], answer:1},
{question:"Sering nonton hal sama maka…", options:["Hilang","Muncul lebih banyak","Error","Diblokir"], answer:1},
{question:"Algoritma termasuk…", options:["AI learning","Hardware","OS","CPU"], answer:0},
{question:"Smart Assistant bekerja dengan…", options:["Keyboard","Suara","Mouse","Layar"], answer:1},
{question:"Contoh Smart Assistant…", options:["Excel","Siri","Paint","Notepad"], answer:1},
{question:"Smart Assistant digunakan untuk…", options:["Menghapus data","Memahami perintah suara","Mengganti wallpaper","Mengedit video"], answer:1},
{question:"Teknologi utamanya adalah…", options:["Voice recognition","Keyboard","Printer","Scanner"], answer:0},
{question:"Perintah “putar musik” akan…", options:["Error","Dijalankan","Dihapus","Restart"], answer:1},
{question:"NPC adalah…", options:["Player","Karakter AI","Developer","Penonton"], answer:1},
{question:"NPC berfungsi untuk…", options:["Diam","Menyesuaikan strategi","Menghapus game","Menutup aplikasi"], answer:1},
{question:"Musuh makin sulit karena…", options:["Bug","AI adaptif","Error","Lemot"], answer:1},
{question:"AI dalam game bertujuan…", options:["Menghapus karakter","Membuat game menantang","Mengurangi level","Menghapus skor"], answer:1},
{question:"Contoh AI di game…", options:["Loading","Musuh belajar dari pemain","Menu","Tombol"], answer:1},
{question:"Kesamaan semua contoh AI…", options:["Tanpa data","Memahami pengguna","Manual","Tidak penting"], answer:1}
];

let current=0, score=0, selected=null;
let nama="", kelas="";
let timeLeft = 1800;
let timerInterval;

// PASTIKAN SCRIPT_URL INI ADALAH LINK "NEW DEPLOYMENT" TERBARU DARI GOOGLE APPS SCRIPT
const SCRIPT_URL ="https://script.google.com/macros/s/AKfycbzNe0VkgA0TGeOn4U20Du7pv6BKYWqYHqq0j_NlhzuFxT7j8RZgtUeJh4033ZCXfi5K/exec"; 

function shuffle(array){
  for(let i=array.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [array[i],array[j]]=[array[j],array[i]];
  }
}

function mulaiKuis(){
  nama = document.getElementById("nama").value.trim();
  kelas = document.getElementById("kelas").value.trim();
  if(!nama || !kelas){ alert("Isi nama dan kelas!"); return; }

  shuffle(quiz);
  quiz.forEach(q=>{
    let correct = q.options[q.answer];
    shuffle(q.options);
    q.answer = q.options.indexOf(correct);
  });

  document.getElementById("start").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  startTimer();
  loadQuestion();
}

function startTimer(){
  timerInterval = setInterval(()=>{
    let m = Math.floor(timeLeft/60);
    let s = timeLeft%60;
    document.getElementById("timer").innerText = `Waktu: ${m}:${s<10?'0':''}${s}`;
    if(timeLeft <= 0) showResult();
    timeLeft--;
  },1000);
}

function loadQuestion(){
  const q = quiz[current];
  document.getElementById("question").innerText = q.question; 
  const opt = document.getElementById("options");
  opt.innerHTML="";
  selected = null;

  q.options.forEach((o,i)=>{
    const div=document.createElement("div");
    div.classList.add("option");
    div.innerText=o;
    div.onclick=()=> {
      document.querySelectorAll(".option").forEach(el=>el.classList.remove("selected"));
      div.classList.add("selected");
      selected = i;
    };
    opt.appendChild(div);
  });
}

function nextQuestion(){
  if(selected===null) { alert("Pilih jawaban dulu!"); return; }
  if(selected===quiz[current].answer) score++;
  current++;
  if(current < quiz.length) loadQuestion();
  else showResult();
}

function showResult(){
  clearInterval(timerInterval);
  let nilai = Math.round((score/quiz.length)*100);
  let jumlahSalah = quiz.length - score;
  
  document.getElementById("hasilDetail").innerHTML = "Sedang menyimpan nilai...";
  document.getElementById("modalResult").classList.add("active");

  const dataKirim = { nama, kelas, nilai };

  // MENGIRIM DATA KE GOOGLE SHEETS
  fetch(SCRIPT_URL, {
    method: "POST",
    mode: "no-cors", 
    body: JSON.stringify(dataKirim)
  }).then(() => {
    document.getElementById("hasilDetail").innerHTML = `
      <b>${nama}</b> (${kelas})<br>
      Nilai: <span style="font-size:2em; color:#43cea2;">${nilai}</span><br>
      <p style="font-size: 0.8em; color: #666;">
        Benar: ${score} | Salah: ${jumlahSalah}
      </p>
      <small style="color:green;">Data Berhasil Tersimpan!</small>
    `;
    // Beri jeda 1.5 detik agar Google selesai memproses sebelum kita tarik data Leaderboard
    setTimeout(updateLocalLeaderboard, 1500);
  }).catch(err => {
    document.getElementById("hasilDetail").innerHTML = `<b>${nama}</b> (${kelas})<br>Nilai: ${nilai}<br><small style="color:red;">Gagal simpan ke awan!</small>`;
    updateLocalLeaderboard();
  });
}

function updateLocalLeaderboard() {
  let table = document.getElementById("scoreTable");
  table.innerHTML = "<tr><td colspan='3'>Memuat Ranking...</td></tr>";

  fetch(SCRIPT_URL)
    .then(res => res.json())
    .then(data => {
      // Sortir dari nilai tertinggi
      data.sort((a, b) => b.nilai - a.nilai);
      
      // Filter: Hanya ambil skor pertama yang ditemukan untuk setiap nama (mencegah spam nama)
      const uniqueData = [];
      const seenNames = new Set();
      data.forEach(item => {
        if (!seenNames.has(item.nama.toLowerCase())) {
          seenNames.add(item.nama.toLowerCase());
          uniqueData.push(item);
        }
      });

      // Tampilkan 10 besar
      table.innerHTML = uniqueData.slice(0, 10).map((d, index) => `
        <tr>
          <td>${index + 1}. ${d.nama}</td>
          <td>${d.kelas}</td>
          <td><b>${d.nilai}</b></td>
        </tr>
      `).join("");
    })
    .catch(err => {
      table.innerHTML = "<tr><td colspan='3'>Gagal memuat ranking</td></tr>";
    });
}
</script>

</body>
</html>
